plugins {
    id "com.android.application"
}

android {
    namespace "com.bosism.mediamtxrelay"
    compileSdk 35

    defaultConfig {
        applicationId "com.bosism.mediamtxrelay"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.1.0"

        ndk {
            abiFilters "arm64-v8a"
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
        }
        release {
            minifyEnabled false
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
            keepDebugSymbols += ["**/libmediamtx.so"]
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
